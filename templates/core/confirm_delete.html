{% extends 'base.html' %}
{% block title_page %}Confirmar eliminación{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm text-center">
    <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
    <h3 class="text-xl font-bold mb-2">¿Eliminar {{ tipo }}?</h3>
    <p class="text-gray-500 mb-6">Estás a punto de eliminar "{{ object }}". Esta acción no se puede deshacer.</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex justify-center gap-4">
            <a href="{% url cancel_url %}" class="px-6 py-2 border rounded-xl text-gray-600 hover:bg-gray-100">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-red-500 text-white rounded-xl hover:bg-red-600">Confirmar</button>
        </div>
    </form>
</div>
{% endblock %}
