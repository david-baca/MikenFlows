{% if page.has_other_pages %}
<div class="flex justify-center mt-6">
    <nav class="inline-flex rounded-md shadow-sm">
        {% if page.has_previous %}
        <a href="?page={{ page.previous_page_number }}" class="px-3 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">Anterior</a>
        {% endif %}
        <span class="px-3 py-2 border-t border-b border-gray-300 bg-white text-sm font-medium text-gray-700">Página {{ page.number }} de {{ page.paginator.num_pages }}</span>
        {% if page.has_next %}
        <a href="?page={{ page.next_page_number }}" class="px-3 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">Siguiente</a>
        {% endif %}
    </nav>
</div>
{% endif %}
