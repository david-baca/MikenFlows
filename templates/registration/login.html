{% extends 'base.html' %}
{% block title_page %}Iniciar sesión{% endblock %}
{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl border shadow-sm">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-secondary rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-bolt text-black text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold">Flow Manager</h2>
            <p class="text-gray-500 text-sm">Ingresa tus credenciales</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <input type="text" name="username" placeholder="Usuario" class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-secondary outline-none">
                </div>
                <div>
                    <input type="password" name="password" placeholder="Contraseña" class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-secondary outline-none">
                </div>
                <button type="submit" class="w-full bg-black text-white py-3 rounded-xl font-bold hover:bg-secondary hover:text-black transition-all">Ingresar</button>
            </div>
        </form>
        {% if form.errors %}
        <div class="mt-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm text-center">Usuario o contraseña incorrectos.</div>
        {% endif %}
    </div>
</div>
{% endblock %}
